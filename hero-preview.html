<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GATE RADIO — Anteprima Hero</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="logogate2.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
@font-face { font-family:'Grifter'; src:url('/fonts/grifter-bold.otf') format('opentype'); font-weight:700; font-display:swap; }
:root{ --accent:#FFF200; }
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; background:#000; color:#fff; font-family:'Poppins',sans-serif; overflow:hidden; }

.split{ display:flex; height:100vh; width:100vw; overflow:hidden; }

.half{
  position:relative; flex:1 1 50%; overflow:hidden; cursor:pointer;
  text-decoration:none; color:#fff;
  transition:flex-grow .6s cubic-bezier(.22,1,.36,1), flex-basis .6s cubic-bezier(.22,1,.36,1);
}
#half-eventi{ border-right:1px solid rgba(255,255,255,.14); }

.half video,.half .poster{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.half .poster{ background-size:cover; background-position:center; z-index:0; }
.half video{ z-index:1; }
.half .veil{ position:absolute; inset:0; z-index:2; background:rgba(0,0,0,.62);
  transition:background .6s ease; }

/* hover: la metà sotto al mouse si allarga, l'altra si stringe */
.half:hover{ flex-grow:1.7; }
.split:hover .half:not(:hover){ flex-grow:.65; }
.half:hover .veil{ background:rgba(0,0,0,.34); }

.half .content{ position:absolute; z-index:3; left:0; right:0; bottom:15%;
  text-align:center; padding:0 24px; transition:transform .6s ease; }
.half:hover .content{ transform:translateY(-8px); }
.half .label{ font-family:'Grifter',sans-serif; font-weight:700;
  font-size:clamp(2.4rem,6.5vw,5.5rem); line-height:.92; letter-spacing:.02em;
  text-shadow:0 0 16px rgba(0,0,0,.95); }
.half .sub{ margin-top:12px; font-size:12px; letter-spacing:.16em; text-transform:uppercase;
  color:#d4d4d4; font-family:'Roboto Mono',monospace; }
.half .go{ display:inline-flex; align-items:center; gap:8px; margin-top:18px;
  font-size:12px; letter-spacing:.15em; text-transform:uppercase; color:var(--accent);
  opacity:0; transform:translateY(8px); transition:all .5s ease; }
.half:hover .go{ opacity:1; transform:none; }

/* brand al centro in alto */
.brand{ position:absolute; z-index:6; top:6%; left:50%; transform:translateX(-50%);
  pointer-events:none; text-align:center; }
.brand .wm{ font-family:'Grifter',sans-serif; font-weight:700;
  font-size:clamp(1.7rem,3.6vw,2.8rem); letter-spacing:.04em; text-shadow:0 0 18px rgba(0,0,0,1); }
.brand .wm span{ color:var(--accent); }
.brand .tag{ font-family:'Roboto Mono',monospace; font-size:10px; letter-spacing:.4em;
  color:#bdbdbd; margin-top:6px; text-transform:uppercase; }

.hint{ position:absolute; bottom:18px; left:50%; transform:translateX(-50%); z-index:6;
  font-size:10px; letter-spacing:.25em; color:#6e6e6e; text-transform:uppercase;
  font-family:'Roboto Mono',monospace; pointer-events:none; }

@media (max-width:768px){
  .split{ flex-direction:column; }
  .half{ flex:1 1 50% !important; }
  #half-eventi{ border-right:none; border-bottom:1px solid rgba(255,255,255,.14); }
  .half .veil{ background:rgba(0,0,0,.5); }
  .half .go{ opacity:1; transform:none; }
  .half .content{ bottom:12%; }
}
@media (prefers-reduced-motion: reduce){
  .half video{ display:none; }            /* mostra solo il poster */
  .half,.half .content,.half .veil{ transition:none; }
}
</style>
</head>
<body>

  <div class="split" id="split">

    <a class="half" id="half-eventi" href="/events" aria-label="Vai alla sezione Eventi">
      <div class="poster" style="background-image:url('https://pub-41e721a087ea4a26b789322b03e6334d.r2.dev/video/hero-left.jpg?v=3')"></div>
      <video autoplay muted loop playsinline preload="auto"
             poster="https://pub-41e721a087ea4a26b789322b03e6334d.r2.dev/video/hero-left.jpg?v=3">
        <source src="https://pub-41e721a087ea4a26b789322b03e6334d.r2.dev/video/hero-left.mp4?v=3" type="video/mp4">
      </video>
      <div class="veil"></div>
      <div class="content">
        <div class="label">EVENTI</div>
        <div class="sub">Showcase · Gate Nacht · Live</div>
        <div class="go">Entra →</div>
      </div>
    </a>

    <a class="half" id="half-radio" href="/radio" aria-label="Vai alla sezione Radio">
      <div class="poster" style="background-image:url('https://pub-41e721a087ea4a26b789322b03e6334d.r2.dev/video/hero-right.jpg?v=3')"></div>
      <video autoplay muted loop playsinline preload="auto"
             poster="https://pub-41e721a087ea4a26b789322b03e6334d.r2.dev/video/hero-right.jpg?v=3">
        <source src="https://pub-41e721a087ea4a26b789322b03e6334d.r2.dev/video/hero-right.mp4?v=3" type="video/mp4">
      </video>
      <div class="veil"></div>
      <div class="content">
        <div class="label">RADIO</div>
        <div class="sub">Streaming · Archivio · Resident</div>
        <div class="go">Entra →</div>
      </div>
    </a>

  </div>

  <div class="brand">
    <div class="wm">GATE <span>RADIO</span></div>
    <div class="tag">Roma</div>
  </div>

  <div class="hint">passa il mouse · clicca una metà</div>

  <script>
    // Pausa i video quando non sono in vista (risparmio CPU/batteria)
    const vids = [...document.querySelectorAll('video')];
    if ('IntersectionObserver' in window) {
      const io = new IntersectionObserver(entries => {
        entries.forEach(e => {
          const v = e.target;
          if (e.isIntersecting) { v.play().catch(()=>{}); } else { v.pause(); }
        });
      }, { threshold: 0.1 });
      vids.forEach(v => io.observe(v));
    }
    // Su connessioni lente / risparmio dati: niente video, solo poster
    const c = navigator.connection;
    if (c && (c.saveData || /2g/.test(c.effectiveType || ''))) {
      vids.forEach(v => { v.removeAttribute('autoplay'); v.pause(); v.style.display = 'none'; });
    }
  </script>
</body>
</html>
